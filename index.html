<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 海底瀑布 - Three.js</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container"></div>
    
    <!-- UI 控制面板 -->
    <div id="controls">
        <div class="control-group">
            <label>海水波动强度</label>
            <input type="range" id="waveAmplitude" min="0" max="2" step="0.1" value="0.5">
            <span id="waveAmplitudeValue">0.5</span>
        </div>
        
        <div class="control-group">
            <label>瀑布粒子数量</label>
            <input type="range" id="particleCount" min="1000" max="10000" step="1000" value="5000">
            <span id="particleCountValue">5000</span>
        </div>
        
        <div class="control-group">
            <label>瀑布流速</label>
            <input type="range" id="waterfallSpeed" min="0" max="0.5" step="0.01" value="0.1">
            <span id="waterfallSpeedValue">0.1</span>
        </div>
        
        <div class="control-group">
            <label>光照强度</label>
            <input type="range" id="lightIntensity" min="0" max="2" step="0.1" value="1">
            <span id="lightIntensityValue">1</span>
        </div>
        
        <div class="control-group">
            <button id="resetBtn">重置场景</button>
            <button id="toggleInfo">显示/隐藏信息</button>
        </div>
    </div>
    
    <!-- 信息面板 -->
    <div id="info">
        <h3>3D 海底瀑布场景</h3>
        <p>FPS: <span id="fps">60</span></p>
        <p>鼠标拖拽：旋转视角</p>
        <p>鼠标滚轮：缩放</p>
        <p>双击：重置相机</p>
    </div>

    <!-- Three.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 控制器 -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>
    
    <!-- 自定义脚本 -->
    <script src="js/utils.js"></script>
    <script src="js/ocean.js"></script>
    <script src="js/waterfall.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
